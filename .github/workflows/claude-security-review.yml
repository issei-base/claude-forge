name: Claude Security Review

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write  # anthropics/claude-code-action requires GitHub OIDC token

jobs:
  security:
    # `claude-review` ラベルが付いている PR でのみ起動。ship skill が自動付与する。
    if: contains(github.event.pull_request.labels.*.name, 'claude-review')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude security review
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            このプルリクエストのセキュリティレビューを実施してください。日本語でコメントしてください。

            重点観点:
            - **OWASP Top 10**: injection (SQL/コマンド/template), XSS, SSRF, IDOR, 認可 bypass, 不安全な deserialization
            - **シークレット混入**: ハードコードされた API key / token / password / 秘密鍵 (.env, config 含む)
            - **認証・認可の漏れ**: エンドポイント保護不足、権限チェック忘れ、JWT 検証不備
            - **入力バリデーション**: 信頼境界での未検証入力、サイズ上限欠如、型強制ミス
            - **依存関係**: 新規追加 package に既知 CVE が無いか
            - **ログ漏洩**: トークン・PII・パスワードがログに出る可能性
            - **暗号処理の誤用**: 弱い algorithm、固定 IV/salt、独自実装、TLS 検証 disable
            - **インフラ系**: IAM 過剰権限、public S3、SG の 0.0.0.0/0、暗号化未設定
            - **prompt injection** (AI 関連 PR の場合): 信頼できない入力が system prompt に届く経路

            指摘の出し方:
            - inline PR コメント (該当行) で残してください
            - 各指摘の冒頭に severity tag を付けてください: `[critical]` `[high]` `[medium]` `[low]`
            - 推測ベース・FUD は避ける。根拠 (攻撃シナリオ) を 1 文で添える

            ★ **最後にこの workflow step の exit code を制御してください**。Branch Protection の Required status check として merge をブロックするために必須です:

            ```sh
            # critical / high のセキュリティ指摘が 1 件もない場合
            gh pr review "$PR_NUMBER" -R "$REPO" --comment --body "Claude Security Review: 重大なセキュリティ懸念は見つかりませんでした"
            # 正常終了 (step は success → check pass → merge 可)

            # critical または high が 1 件でもある場合
            gh pr review "$PR_NUMBER" -R "$REPO" --comment --body "Claude Security Review: critical/high のセキュリティ指摘あり。inline コメントを参照"
            exit 1   # step を fail させる (check fail → Branch Protection で merge ブロック)
            ```

            - approve / request-changes は **使わない** (review workflow がそれを担当する)。
            - 「念のため」「ベストプラクティス的に」では critical/high にしない。具体的な攻撃シナリオが書ける指摘のみ。
