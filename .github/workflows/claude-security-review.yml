name: Claude Security Review

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_call:
    inputs:
      gate:
        description: "'all' = 全 PR をレビュー / それ以外 = 'claude-review' ラベル付き PR のみ"
        type: string
        default: 'label'
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

permissions:
  contents: read
  pull-requests: write   # inline review comments
  id-token: write        # anthropics/claude-code-action requires a GitHub OIDC token

concurrency:
  group: claude-security-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security:
    # 直接の pull_request 起動（claude-forge 自身）: `claude-review` ラベル付き PR のみ。
    # workflow_call で他 repo から呼ばれた場合: 呼び出し側が gate: 'all' を渡せば全 PR で起動。
    if: inputs.gate == 'all' || contains(github.event.pull_request.labels.*.name, 'claude-review')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Claude security review
        uses: anthropics/claude-code-action@70a6e5256e9e2366a1ed5c041904a982ba3a328f # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            このプルリクエストのセキュリティレビューを実施してください。日本語でコメントしてください。

            重点観点:
            - **OWASP Top 10**: injection (SQL/コマンド/template), XSS, SSRF, IDOR, 認可 bypass, 不安全な deserialization
            - **シークレット混入**: ハードコードされた API key / token / password / 秘密鍵 (.env, config 含む)
            - **認証・認可の漏れ**: エンドポイント保護不足、権限チェック忘れ、JWT 検証不備
            - **入力バリデーション**: 信頼境界での未検証入力、サイズ上限欠如、型強制ミス
            - **依存関係**: 新規追加 package に既知 CVE が無いか
            - **ログ漏洩**: トークン・PII・パスワードがログに出る可能性
            - **暗号処理の誤用**: 弱い algorithm、固定 IV/salt、独自実装、TLS 検証 disable
            - **インフラ系**: IAM 過剰権限、public S3、SG の 0.0.0.0/0、暗号化未設定
            - **prompt injection** (AI 関連 PR の場合): 信頼できない入力が system prompt に届く経路

            指摘の出し方:
            - inline PR コメント (該当行) で残してください
            - 各指摘の冒頭に severity tag を付けてください: `[critical]` `[high]` `[medium]` `[low]`
            - 推測ベース・FUD は避ける。根拠 (攻撃シナリオ) を 1 文で添える

            最後に、検出した critical/high の件数を PR にサマリーコメントとして 1 つ残してください。重大な懸念がゼロなら「重大なセキュリティ懸念は見つかりませんでした」と明記。
            approve / request-changes の review state は付けません (このリポジトリは Branch Protection off で、merge は人間が手動判断するため)。
            「念のため」「ベストプラクティス的に」では critical/high にしない。具体的な攻撃シナリオが 1 文で書ける指摘のみ。
