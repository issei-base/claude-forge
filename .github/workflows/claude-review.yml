name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  pull-requests: write   # inline review comments
  id-token: write        # anthropics/claude-code-action requires a GitHub OIDC token

concurrency:
  # 連続 push のたびに前の実行をキャンセルし、quota を無駄遣いしない。
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Legacy fallback: `claude-review` ラベルが付いている PR でのみ起動。
    # 標準の PR review は Codex GitHub code review / `@codex review` に寄せる。
    if: contains(github.event.pull_request.labels.*.name, 'claude-review')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude code review
        uses: anthropics/claude-code-action@70a6e5256e9e2366a1ed5c041904a982ba3a328f # v1
        with:
          # Pro/Max サブスクリプションを使う場合: `claude setup-token` で生成した
          # OAuth token を repo secrets に CLAUDE_CODE_OAUTH_TOKEN として登録。
          # 代わりに API key を使うなら下の anthropic_api_key を有効化。
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            このプルリクエストをレビューしてください。日本語でコメントしてください。

            重点的に見る観点:
            - **正しさのバグ**: ロジック誤り、off-by-one、null 参照、レースコンディション
            - **既存コードとの整合性**: 命名規約、設計パターン、エラーハンドリング方針
            - **テスト**: カバレッジの妥当性、edge case の見落とし、テスト自体の品質
            - **可読性**: 命名、関数分割、コメントの妥当性
            - **パフォーマンス**: N+1、不必要なループ、メモリリーク懸念

            指摘の出し方:
            - inline PR コメント (該当行に直接) で残してください
            - 各指摘の冒頭に severity tag を付けてください: `[critical]` `[high]` `[medium]` `[low]` `[nit]`
            - 推測ベースの「念のため」指摘は避け、根拠ある指摘のみ

            セキュリティ観点は別 workflow (Claude Security Review) が担当するため、ここでは深追いしないでください。

            最後に、指摘の要約 (critical/high の有無と件数) を PR にサマリーコメントとして 1 つ残してください。指摘ゼロなら「問題は見つかりませんでした」と明記。
            approve / request-changes の review state は付けません (このリポジトリは Branch Protection off で、merge は人間が手動判断するため)。
