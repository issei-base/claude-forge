name: Skill Lint

# Deterministic gate for skill integrity, in CI as a backstop to the local
# Stop hook (.claude/hooks/skill-lint.py). The hook only fires for whoever has
# the project open locally; this catches a broken SKILL.md (name<->dir mismatch,
# missing description, duplicate name) on any PR — e.g. edited via the web UI or
# a machine without the hook. Pure stdlib Python, no Claude, no secrets, no tokens.

on:
  pull_request:
    paths:
      - "plugins/**"
      - ".claude/skills/**"
      - ".claude/agents/**"
      - ".claude/hooks/**"
      - ".claude-plugin/**"
      - "tests/**"
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - ".claude/skills/**"
      - ".claude/agents/**"
      - ".claude/hooks/**"
      - ".claude-plugin/**"
      - "tests/**"

permissions:
  contents: read

concurrency:
  group: skill-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      # --strict: in CI, warnings (e.g. a skill with no triggers.json fixture)
      # are errors too. Locally the Stop hook runs without --strict so a missing
      # fixture only warns and never blocks the turn.
      - run: python3 tests/lint_skills.py --strict
      # Unit tests for the hooks (git-push-guard tokenizer) and skill scripts.
      # Without this, a PR that breaks a hook triggers no CI at all.
      - run: python3 tests/test_scripts.py
